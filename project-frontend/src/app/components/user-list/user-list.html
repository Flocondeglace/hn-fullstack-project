<h2>User List</h2>
<button class="btn btn-primary m-2" routerLink="/user-form">Add an user</button>

<table class="table table-striped table-hover mt-2">
  <thead class="table-primary">
    <tr>
      <th class="col-2">Type user</th>
      <th class="col-2">Last name</th>
      <th class="col-2">First name</th>
      <th class="col-2">Email</th>
      <th class="col-2">Actions</th>
    </tr>
  </thead>
  <tbody>
    @for (tempUser of users(); track $index) {
      <tr routerLink="/user-details/{{ tempUser.id }}" style="cursor: pointer">
        <td>
          @if (tempUser.userTypeId; as typeId) {
            {{ typesMap().get(typeId) }}
          }
        </td>
        <td>{{ tempUser.lastName }}</td>
        <td>{{ tempUser.firstName }}</td>
        <td>{{ tempUser.email }}</td>
        <td routerLink="/users" (click)="$event.stopPropagation()">
          <div class="row">
            <div class="m-1">
              <button
                class="btn btn-sm btn-outline-primary"
                routerLink="/user-form/{{ tempUser.id }}"
              >
                Edit
              </button>
            </div>
            <div class="m-1">
              <button class="btn btn-sm btn-outline-danger" (click)="removeUser(tempUser.id!)">
                Remove
              </button>
            </div>
          </div>
        </td>
      </tr>
    }
  </tbody>
</table>
