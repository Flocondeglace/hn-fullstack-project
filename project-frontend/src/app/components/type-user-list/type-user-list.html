<h2>Type user List</h2>
<button class="btn btn-primary m-2" routerLink="/types-form">Add a type user</button>

<table class="table table-striped mt-2">
  <thead class="table-primary">
    <tr>
      <th>id</th>
      <th>Type user</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    @for (tempType of typeUsers(); track $index) {
      <tr>
        <td>{{ tempType.id }}</td>
        <td>{{ tempType.typeName }}</td>
        <td>
          <div class="row">
            <div class="col-sm-3">
              <button
                class="btn btn-sm btn-outline-primary"
                routerLink="/types-form/{{ tempType.id }}"
              >
                Edit
              </button>
            </div>
            <div class="col-sm-3">
              <button class="btn btn-sm btn-outline-danger" (click)="removeUserType(tempType.id!)">
                Remove
              </button>
            </div>
          </div>
        </td>
      </tr>
    }
  </tbody>
</table>
