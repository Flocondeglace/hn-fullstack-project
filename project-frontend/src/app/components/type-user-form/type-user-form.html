<h2>Add / Edit an User Type</h2>
<div class="container-fluid text-center">
  <form [formGroup]="typeUserForm" (ngSubmit)="onSubmit()">
    <div class="row">
      <div class="col-md-2">
        <input type="text" placeholder="Write the user type" formControlName="typeName" />
      </div>
    </div>
    <app-message-errors [control]="typeName!" name="user type"></app-message-errors>

    <div class="row">
      <p class="text-info">{{ message() }}</p>
    </div>

    <div class="row mt-2 justify-content-center">
      <div class="col-sm-3">
        <button type="submit" class="btn btn-primary" [disabled]="typeUserForm.invalid">
          Save
        </button>
      </div>

      <div class="col-sm-3">
        <a class="btn btn-danger" routerLink="/types">Cancel</a>
      </div>
    </div>
  </form>
</div>
