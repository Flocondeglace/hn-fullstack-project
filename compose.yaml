services:
  db:
    image: mysql:8.4
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fullstack_project
      MYSQL_USER: fullstack-user
      MYSQL_PASSWORD: password
    volumes:
      - ./db-scripts/create-table.sql:/docker-entrypoint-initdb.d/1init.sql
      - ./db-scripts/fill-table.sql:/docker-entrypoint-initdb.d/2init.sql
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build: fullstack-project-backend/.
    ports:
      - "8090:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: project-frontend/.
    ports:
      - "4200:4200"
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
volumes:
  db_data:
